x-service: &base-service
  restart: always
  env_file:
    - default.env
    - ${ENVIRONMENT_FILE:-.env}
  networks:
    - vc-network
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"


x-base-django: &base-django
  <<: *base-service
  build:
    context: admin
    dockerfile: Dockerfile
  working_dir: /usr/src/app
  environment:
    - PYTHONPATH=/usr/src/app:/workspace
  volumes:
    - ./admin:/usr/src/app
    - ./common:/workspace/common

x-django: &django
  <<: *base-django
  depends_on:
    - db-migrate
    - collectstatic

x-backend: &backend
  <<: *base-service
  build:
    context: backend
    dockerfile: Dockerfile
  environment:
    - PYTHONPATH=/usr/src/app:/workspace
  volumes:
    - ./backend:/usr/src/app
    - ./common:/workspace/common
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    nats:
      condition: service_started

services:
  nginx:
    <<: *base-service
    container_name: nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./admin/static:/static
      - ./admin/media:/media
      - ./webapp/dist:/webapp
    depends_on:
      - webapp_build
      - webapp_api
      - in_callbacks
      - admin

  db-migrate:
    <<: *base-django
    container_name: db-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    command: python ./manage.py migrate

  collectstatic:
    <<: *base-django
    container_name: collectstatic
    restart: "no"
    command: python manage.py collectstatic --no-input
    volumes:
      - ./dist:/usr/src/dist

  admin:
    <<: *django
    container_name: admin
    ports:
      - "7002:8000"
    command: python ./manage.py runserver 0.0.0.0:8000

  bot:
    <<: *backend
    container_name: bot
    command: python -m bot.bot

  rates:
    <<: *backend
    container_name: rates
    command: python -m main rates

  fiscal:
    <<: *backend
    container_name: fiscal
    command: python -m main fiscal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  yeezypay_gate:
    <<: *backend
    container_name: yeezypay_gate
    command: python -m main yeezypay-gate
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  webapp_api:
    <<: *backend
    container_name: webapp_api
    ports:
      - "9502:8002"
    command: python -m main webapp-api

  in_callbacks:
    <<: *backend
    container_name: in_callbacks
    environment:
      - PYTHONPATH=/usr/src/app:/workspace
      - CALL_GATES=yeezypay
    ports:
      - "8001:8001"
    command: python -m main in-callbacks
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  trongrid_monitor:
    <<: *backend
    container_name: trongrid_monitor
    command: python -m main trongrid-monitor
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  out_callbacks:
    <<: *backend
    container_name: out_callbacks
    command: python -m main out-callbacks
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  notifications:
    <<: *backend
    container_name: notifications
    command: python -m main notifications

  webapp_build:
    <<: *base-service
    container_name: webapp_build
    build:
      context: webapp
      dockerfile: Dockerfile
    restart: "no"
    volumes:
      - ./webapp/dist:/app/dist

  #### INFRASTRUCTURE SERVICES ####
  db:
    <<: *base-service
    container_name: db
    image: postgres:14.2
    ports:
      - "7432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    <<: *base-service
    container_name: redis
    image: redis:7.0.5-alpine3.16
    command: ["sh", "-c", 'exec redis-server --requirepass "$REDIS_PASSWORD"']
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    <<: *base-service
    container_name: nats
    image: nats:2.10.24
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  pg_backup:
    <<: *base-service
    container_name: pg_backup
    image: prodrigestivill/postgres-backup-local:14
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=2
      - BACKUP_KEEP_MONTHS=3
      - HEALTHCHECK_PORT=8080
    volumes:
      - ./backups:/backups

networks:
  vc-network:
    driver: bridge

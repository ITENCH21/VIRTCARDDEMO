version: "3"

x-service: &base-service
  restart: always
  env_file:
    - default.env
    - ${ENVIRONMENT_FILE:-.env}
  networks:
    - vc-network

x-base-django: &base-django
  <<: *base-service
  build:
    context: admin
    dockerfile: Dockerfile
  working_dir: /usr/src/app
  environment:
    - PYTHONPATH=/usr/src/app:/workspace
  volumes:
    - ./admin:/usr/src/app
    - ./common:/workspace/common

x-django: &django
  <<: *base-django
  depends_on:
    - db-migrate
    - collectstatic

x-backend: &backend
  <<: *base-service
  build:
    context: backend
    dockerfile: Dockerfile
  environment:
    - PYTHONPATH=/usr/src/app:/workspace
  volumes:
    - ./backend:/usr/src/app
    - ./common:/workspace/common

services:
  nginx:
    <<: *base-service
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./admin/static:/static
      - ./admin/media:/media

  db-migrate:
    <<: *base-django
    restart: "no"
    command: python ./manage.py migrate

  collectstatic:
    <<: *base-django
    restart: "no"
    command: python manage.py collectstatic --no-input
    volumes:
      - ./dist:/usr/src/dist

  admin:
    <<: *django
    container_name: admin-vc
    ports:
      - "7002:8000"
    command: python ./manage.py runserver 0.0.0.0:8000

  bot:
    <<: *backend
    command: python -m bot.bot

  rates:
    <<: *backend
    command: python -m main rates

  fiscal:
    <<: *backend
    command: python -m main fiscal

  yeezypay_gate:
    <<: *backend
    command: python -m main yeezypay

  #### INFRASTRUCTURE SERVICES ####
  db:
    <<: *base-service
    image: postgres:14.2
    ports:
      - "7432:5432"

    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
  redis:
    <<: *base-service
    image: redis:7.0.5-alpine3.16
    command: ["sh", "-c", 'exec redis-server --requirepass "$REDIS_PASSWORD"']

  nats:
    <<: *base-service
    image: nats:2.10.24
    command: ["-js"]
    ports:
      - "4222:4222"

networks:
  vc-network:
    driver: bridge
